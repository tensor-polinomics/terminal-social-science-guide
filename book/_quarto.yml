project:
  type: book
  output-dir: _book

book:
  title: "The Terminal and Shell for Social Science Researchers"
  subtitle: "A reproducible-workflow guide for economics, finance, and the social sciences"
  author: "Emma Luo"
  date: today
  search: true
  reader-mode: true
  page-footer:
    left: "Built with Quarto. Reproducibility first."
  sidebar:
    style: docked
    collapse-level: 1
  chapters:
    - index.qmd
    - part: "Literacy Foundation"
      chapters:
        - chapters/01-why-terminal.qmd
        - chapters/02-mental-model.qmd
        - chapters/03-setup.qmd
        - chapters/04-navigation.qmd
        - chapters/05-organizing-project.qmd
    - part: "Core Fluency"
      chapters:
        - chapters/06-pipes-redirection-danger.qmd
        - chapters/07-text-tabular-data.qmd
        - chapters/08-finding-things.qmd
        - chapters/09-processes-permissions-secrets.qmd
    - part: "Workflow Climax"
      chapters:
        - chapters/10-scripts-fail-loudly.qmd
        - chapters/11-make-pipeline.qmd
        - chapters/12-environments.qmd
        - chapters/13-ssh-remote-compute.qmd
        - chapters/14-persistent-sessions.qmd
    - part: "Modern Tooling and AI"
      chapters:
        - chapters/15-modern-cli-tuis.qmd
        - chapters/16-ai-terminal.qmd
        - chapters/17-startup-files-path.qmd
    - part: "Reference"
      chapters:
        - panic.qmd
        - divergence.qmd
        - cheatsheet.qmd
        - checklist.qmd
        - references.qmd

bibliography: references.bib
# Quarto's default citation style is Chicago Manual of Style 17th edition
# (author-date); leaving csl unset renders Chicago author-date.
link-citations: true

# HTML + PDF. HTML publishes to Quarto Pub; PDF is rendered alongside for
# the human review / reconciliation process at each gate (matched to the
# Git book, which also renders both).
format:
  html:
    theme:
      - cosmo
      - includes/custom.scss
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    df-print: kable
    default-image-extension: svg
  pdf:
    documentclass: scrreprt
    keep-tex: false
    default-image-extension: pdf
    # Break long code lines in the PDF instead of running off the
    # page (the HTML side already wraps via code-overflow). Needed
    # because verbatim captured output is never hand-wrapped (real-
    # output contract, option A): e.g. Ch 2's BSD `ls` usage line.
    # fvextra redefines the highlighted-code environment with
    # breaklines; breakanywhere handles long unbroken option
    # strings. A small hooked arrow marks each continuation.
    include-in-header:
      text: |
        \usepackage{fvextra}
        \DefineVerbatimEnvironment{Highlighting}{Verbatim}{breaklines,breakanywhere,commandchars=\\\{\}}
        \fvset{breaklines=true,breakanywhere=true}
        % placeins provides \FloatBarrier, used after a figure's
        % home section so a float can never drift into a later
        % section's command blocks (Ch 2 figure, review round 3).
        \usepackage{placeins}

execute:
  freeze: auto
  echo: true
